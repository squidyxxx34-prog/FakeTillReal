<!DOCTYPE html>
<html lang="fr" style="height:100%;background:#111111;">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<title>FakeTillReal — Créer votre compte</title>
<style>
* { box-sizing: border-box; margin: 0; padding: 0; }
body {
  font-family: -apple-system, BlinkMacSystemFont, 'SF Pro Display', sans-serif;
  background: #111111;
  color: #ffffff;
  min-height: 100vh;
  display: flex;
  align-items: center;
  justify-content: center;
  padding: 24px;
}
.container {
  width: 100%;
  max-width: 360px;
  display: flex;
  flex-direction: column;
  align-items: center;
  gap: 0;
}
.logo { font-size: 52px; margin-bottom: 16px; }
h1 {
  font-size: 26px;
  font-weight: 700;
  letter-spacing: -0.5px;
  margin-bottom: 8px;
  text-align: center;
}
.sub {
  font-size: 15px;
  color: #8e8e93;
  text-align: center;
  margin-bottom: 36px;
  line-height: 1.4;
}
.success-badge {
  background: rgba(52, 199, 89, 0.15);
  border: 1px solid rgba(52, 199, 89, 0.3);
  border-radius: 12px;
  padding: 10px 18px;
  font-size: 13px;
  color: #34c759;
  margin-bottom: 32px;
  display: flex;
  align-items: center;
  gap: 8px;
}
.field {
  width: 100%;
  background: #1c1c1e;
  border-radius: 14px;
  padding: 16px 18px;
  font-size: 16px;
  color: #fff;
  border: 1.5px solid transparent;
  outline: none;
  margin-bottom: 12px;
  transition: border-color 0.2s;
  -webkit-appearance: none;
}
.field:focus { border-color: #9b8fff; }
.field::placeholder { color: #48484a; }
.btn {
  width: 100%;
  background: #9b8fff;
  color: #fff;
  font-size: 17px;
  font-weight: 600;
  border: none;
  border-radius: 14px;
  padding: 16px;
  margin-top: 8px;
  cursor: pointer;
  transition: opacity 0.15s, transform 0.1s;
  -webkit-appearance: none;
}
.btn:active { opacity: 0.85; transform: scale(0.98); }
.btn:disabled { opacity: 0.4; cursor: default; }
.error {
  color: #ff453a;
  font-size: 14px;
  text-align: center;
  margin-top: 12px;
  min-height: 20px;
}
.hint {
  font-size: 12px;
  color: #48484a;
  margin-top: -6px;
  margin-bottom: 8px;
  align-self: flex-start;
  padding-left: 4px;
}
</style>
</head>
<body>
<div class="container">
  <div class="logo">🐸</div>
  <h1>Créez votre compte</h1>
  <p class="sub">Paiement confirmé ! Choisissez votre identifiant et mot de passe.</p>

  <div class="success-badge">
    <span>✓</span> Accès à vie débloqué
  </div>

  <input class="field" id="username" type="text" placeholder="Username" autocomplete="username"
    autocorrect="off" autocapitalize="none" spellcheck="false" maxlength="24">
  <p class="hint">Lettres, chiffres et _ · 3 à 24 caractères</p>

  <input class="field" id="password" type="password" placeholder="Mot de passe" autocomplete="new-password">
  <p class="hint">8 caractères minimum</p>

  <input class="field" id="password2" type="password" placeholder="Confirmer le mot de passe" autocomplete="new-password">

  <button class="btn" id="btn" onclick="createAccount()">Créer mon compte</button>
  <div class="error" id="err"></div>
</div>

<script>
  // Récupérer session_id depuis l'URL
  const params = new URLSearchParams(window.location.search);
  const sessionId = params.get('session_id');

  if (!sessionId) {
    document.getElementById('err').textContent = 'Lien invalide. Revenez depuis la confirmation de paiement.';
    document.getElementById('btn').disabled = true;
  }

  async function createAccount() {
    const username = document.getElementById('username').value.trim();
    const password = document.getElementById('password').value;
    const password2 = document.getElementById('password2').value;
    const errEl = document.getElementById('err');
    const btn = document.getElementById('btn');

    errEl.textContent = '';

    if (!username || !password || !password2) {
      errEl.textContent = 'Remplissez tous les champs.'; return;
    }
    if (password !== password2) {
      errEl.textContent = 'Les mots de passe ne correspondent pas.'; return;
    }

    btn.disabled = true;
    btn.textContent = 'Création…';

    try {
      const res = await fetch('/api/create-account', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ session_id: sessionId, username, password }),
      });
      const data = await res.json();

      if (!res.ok) {
        errEl.textContent = data.error || 'Erreur inconnue.';
        btn.disabled = false;
        btn.textContent = 'Créer mon compte';
        return;
      }

      // Sauvegarder le token et rediriger vers l'app
      localStorage.setItem('ftr_token', data.token);
      localStorage.setItem('ftr_username', data.username);
      window.location.href = '/';
    } catch (e) {
      errEl.textContent = 'Erreur réseau. Réessayez.';
      btn.disabled = false;
      btn.textContent = 'Créer mon compte';
    }
  }
</script>
</body>
</html>
